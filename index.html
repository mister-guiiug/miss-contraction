    <!-- Script anti-FOUC : applique le thème avant tout rendu -->
    <script>
      (function () {
        try {
          var k = 'mc_theme';
          var v = localStorage.getItem(k);
          var eff;
          if (v === 'light' || v === 'dark') eff = v;
          else
            eff = window.matchMedia('(prefers-color-scheme: light)').matches
              ? 'light'
              : 'dark';
          document.documentElement.setAttribute('data-theme', eff);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
