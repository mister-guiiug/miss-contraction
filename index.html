<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <!-- Script anti-FOUC : applique le thème avant tout rendu -->
    <script>
      (function () {
        try {
          var k = 'mc_theme';
          var v = localStorage.getItem(k);
          var eff;
          if (v === 'light' || v === 'dark') eff = v;
          else
            eff = window.matchMedia('(prefers-color-scheme: light)').matches
              ? 'light'
              : 'dark';
          document.documentElement.setAttribute('data-theme', eff);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="icons/icon-192.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="icons/icon-512.png"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta id="meta-theme-color" name="theme-color" content="#a0309a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Miss Contraction" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="icons/apple-touch-icon.png"
    />
    <meta
      name="description"
      content="Comptez la fréquence des contractions et activez une alerte pour la maternité."
    />
    <title>Miss Contraction</title>
    <link rel="stylesheet" href="/src/styles.css" />
    <link rel="stylesheet" href="/src/enhanced-ui.css" />
  </head>

    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
