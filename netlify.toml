# Configuration Netlify pour miss-contraction-dev
# Déploie la branche react-migration sur https://miss-contraction-dev.netlify.app

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  NETLIFY = "true"

# Redirections pour le routing hash
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers pour PWA
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"

